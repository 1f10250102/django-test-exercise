{% load static %}
<!DOCTYPE html>
<html lang="ja">

  <head>
    <title>To Do Application</title>
    <meta charset="UTF-8">
    <meta name="author" content="INIAD">
    <link rel="stylesheet" href="{% static 'todo/style.css' %}">
  </head>

  <body>
    <div class="detail-card">
      <h1>{{ task.title }}</h1>
      <ul>
        <li>Posted at: {{ task.posted_at }}</li>
        {% if task.due_at %}
        <li>Due at: {{ task.due_at }}</li>
        {% endif %}
        {% if task.completed %}
        <li class="status-completed">Status: Completed</li>
        {% else %}
        <li class="status-not-completed">Status: Not Completed</li>
        {% endif %}
      </ul>

      <div class="detail-actions">
        <a href="{% url 'index' %}">Top</a>
        <a href="{% url 'delete' task.id %}">Delete</a>
        <a href="{% url 'close' task.id %}">Close</a>
        <a href="{% url 'update' task.id %}">Edit</a>
      </div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        const savedTheme = localStorage.getItem('theme') || 'light';
        const isDark = savedTheme === 'dark';
        document.body.classList.toggle('dark-theme', isDark);
        document.documentElement.classList.toggle('dark-theme', isDark);
        document.body.style.backgroundColor = isDark ? '#111827' : '#f8f9fa';
        document.body.style.color = isDark ? '#f8f9fa' : '#333';
        document.documentElement.style.backgroundColor = isDark ? '#111827' : '#f8f9fa';
        document.documentElement.style.color = isDark ? '#f8f9fa' : '#333';
      });
    </script>
  </body>

</html>
