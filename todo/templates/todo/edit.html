{% load static %}
<!DOCTYPE html>
<html lang="ja">

  <head>
    <title>To Do Application</title>
    <meta charset="UTF-8">
    <meta name="author" content="INIAD">
    <link rel="stylesheet" href="{% static 'todo/style.css' %}">
  </head>

  <body>
    <h1>Edit task</h1>
    <p>You can edit tasks from the following form.</p>
    <form action="{% url 'update' task.id%}" method="post">
      {% csrf_token %}
      <div>
        <label for="titleInput">Title</label><br>
        <input id="titleInput" name="title" type="text" placeholder="Input title" value="{{ task.title }}">
      </div>
      <div>
        <label for="dueInput">Due at:</label><br>
        <input id="dueInput" name="due_at" type="datetime-local" value="{{ task.due_at |date:"Y-m-d H:i" }}">
      </div>
      <div>
        <button type="submit">Submit</button>
      </div>
    </form>
    <br>

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        const savedTheme = localStorage.getItem('theme') || 'light';
        const isDark = savedTheme === 'dark';
        document.body.classList.toggle('dark-theme', isDark);
        document.documentElement.classList.toggle('dark-theme', isDark);
        document.body.style.backgroundColor = isDark ? '#111827' : '#f8f9fa';
        document.body.style.color = isDark ? '#f8f9fa' : '#333';
        document.documentElement.style.backgroundColor = isDark ? '#111827' : '#f8f9fa';
        document.documentElement.style.color = isDark ? '#f8f9fa' : '#333';
      });
    </script>
  </body>

</html>
